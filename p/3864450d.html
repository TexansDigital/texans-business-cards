    .ci{width:36px;height:36px;border-radius:8px;background:var(--g100);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .ci svg{width:18px;height:18px;color:var(--primary)}

    .bp{background:var(--primary);color:var(--white)}

    .ft img{height:20px;opacity:.3;margin-bottom:8px}
    .ft p{font-size:.7rem;color:var(--g500)}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--primary);color:#fff;padding:12px 24px;border-radius:10px;font-size:.85rem;font-weight:500;opacity:0;transition:transform .3s,opacity .3s;z-index:100}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
