name: Convert SVGs to PNGs

on:
  push:
    branches: [main]
    paths:
      - 'card_*.svg'
      - 'p/*.html'

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Puppeteer
        run: npm install puppeteer@latest

      - name: Convert new SVGs to PNGs
        run: node .github/scripts/svg-to-png.js

      - name: Commit PNGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-convert SVGs to PNGs"
          file_pattern: "*.png"
